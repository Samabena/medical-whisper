# SPA + proxy API/WebSocket vers le backend (profil dev Docker, sans Caddy).
# En prod, Caddy assure ce routage ; ici nginx le fait pour que :5173 soit autonome.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Host préservé : le backend construit ws_url depuis le Host reçu
    # (→ ws://localhost:5173/v1/live/... que le navigateur peut joindre).
    location /v1/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;       # support WebSocket (/v1/live)
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    location /admin/api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $http_host;
    }

    location = /health { proxy_pass http://backend:8000; }
    location = /metrics { proxy_pass http://backend:8000; }

    # Routage SPA côté client.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
