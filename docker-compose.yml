# Voice-to-Form Live — orchestration des services (architecture « sandwich » CPU).
#
# Chaque serveur est un composant Docker distinct :
#   backend  (FastAPI)      · frontend (React/nginx) · db (Postgres) · redis
#   piper    (TTS HTTP, CPU) — « Piper live » : voix .onnx chargée EN MÉMOIRE au démarrage
#                             + endpoint /stream (PCM chunké) ; backend via TTS_BACKEND=piper_http
#   proxy    (Caddy, TLS)   · migrate (Alembic, one-shot)
# Le STT est fourni par le serveur en ligne de l'équipe (ws://srv-team-ia:9300) via
# STT_BACKEND=whisperlive. L'agent + l'extraction LLM passent par Ollama Cloud
# (OLLAMA_HOST=https://ollama.com + OLLAMA_API_KEY) — plus de service STT ni Ollama local.
#
# Profils :
#   dev            → pile minimale HORS-LIGNE : SPEECH_AGENT=stub, EXTRACTOR_BACKEND=null.
#                    Aucun modèle, aucun GPU.   docker compose --profile dev up --build
#   voice          → ajoute le TTS local Piper (STT + LLM = services en ligne). À combiner
#                    avec dev pour tester en local : docker compose --profile dev --profile voice up
#   prod           → pile complète + reverse-proxy TLS (Caddy).
#                    docker compose --profile prod up --build -d
#
# Tout est piloté par .env (jamais commité). Voir .env.example. La bascule stub↔sandwich
# se fait via SPEECH_AGENT dans .env (pas via un profil).
#
# Données persistantes : bind mounts vers /srv/poleia/data/medical-whisper/
# Conforme aux conventions d'infrastructure du Pôle IA.

x-backend-base: &backend-base
  build:
    context: ./backend
  env_file: [.env]
  networks: [internal]
  restart: unless-stopped

services:
  # ---------------------------------------------------------------- Reverse proxy (TLS, routage)
  proxy:
    image: caddy:2-alpine
    profiles: [prod]
    ports: ["80:80", "443:443"]
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/poleia/data/medical-whisper/caddy:/data
    depends_on:
      backend: { condition: service_healthy }
      frontend: { condition: service_started }
    networks: [internal]
    restart: unless-stopped

  # ---------------------------------------------------------------- Frontend React (portail Admin)
  frontend:
    build:
      context: ./frontend
    profiles: [dev, prod]
    ports: ["5173:80"]
    networks: [internal]
    restart: unless-stopped

  # ---------------------------------------------------------------- Migrations (one-shot, bloquant)
  migrate:
    <<: *backend-base
    profiles: [dev, prod]
    command: alembic upgrade head
    depends_on:
      db: { condition: service_healthy }
    restart: "no"

  # ---------------------------------------------------------------- Backend FastAPI
  backend:
    <<: *backend-base
    profiles: [dev, prod]
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    command: uvicorn app.interface.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------- Base de données
  db:
    image: postgres:16-alpine
    profiles: [dev, prod]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vtf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-voicetoform}
    volumes:
      - /srv/poleia/data/medical-whisper/postgres:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vtf}"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------- Redis (jetons, pub/sub, rate-limit)
  redis:
    image: redis:7-alpine
    profiles: [dev, prod]
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /srv/poleia/data/medical-whisper/redis:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------- TTS — « Piper live » (CPU, en mémoire)
  # Voix .onnx chargée UNE fois au démarrage (API PiperVoice) ; /stream émet le PCM s16le au fil
  # de l'eau (1er son plus tôt). Le backend l'utilise via TTS_BACKEND=piper_http + PIPER_URL.
  # NB : le backend NE dépend PAS durement de `piper` (le profil dev doit rester hors-ligne, et une
  # panne TTS ne coupe pas le relais : PiperHttpTts lève une erreur non fatale). Le healthcheck
  # ci-dessous renvoie 503 tant que la voix n'est pas chargée (détecte un .onnx corrompu au boot).
  piper:
    build:
      context: ./piper-server
    profiles: [voice, prod]
    environment:
      PIPER_VOICE: ${PIPER_VOICE:-/voices/fr_FR-siwis-medium.onnx}
    volumes: [./voices:/voices:ro]
    networks: [internal]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  internal: {}