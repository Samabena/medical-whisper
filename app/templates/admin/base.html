<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} · Voice-to-Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vtf-bg: #f4f5f8;
            --vtf-surface: #ffffff;
            --vtf-border: #e6e8ec;
            --vtf-text: #1a1f2b;
            --vtf-muted: #6b7280;
            --vtf-primary: #4f46e5;
            --vtf-primary-dark: #4338ca;
            --vtf-primary-soft: #eef0fe;
        }
        * { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
        body {
            background-color: var(--vtf-bg);
            color: var(--vtf-text);
            font-size: 0.925rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Navbar ── */
        .vtf-navbar {
            background: var(--vtf-surface);
            border-bottom: 1px solid var(--vtf-border);
            padding: 0.65rem 0;
        }
        .vtf-brand {
            display: flex; align-items: center; gap: 0.6rem;
            font-weight: 700; font-size: 1.05rem; color: var(--vtf-text);
            text-decoration: none;
        }
        .vtf-brand-mark {
            width: 34px; height: 34px; border-radius: 9px;
            background: linear-gradient(135deg, var(--vtf-primary), #7c75f0);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1.05rem;
            box-shadow: 0 2px 6px rgba(79,70,229,.35);
        }
        .vtf-brand small { display:block; font-weight:500; font-size:.7rem; color:var(--vtf-muted); letter-spacing:.02em; }
        .vtf-nav-link {
            display: inline-flex; align-items: center; gap: 0.45rem;
            color: var(--vtf-muted); text-decoration: none;
            font-weight: 500; padding: 0.45rem 0.85rem; border-radius: 8px;
            transition: all .15s ease;
        }
        .vtf-nav-link:hover { background: var(--vtf-bg); color: var(--vtf-text); }
        .vtf-nav-link.active { background: var(--vtf-primary-soft); color: var(--vtf-primary-dark); }
        .vtf-logout { color: var(--vtf-muted); }
        .vtf-logout:hover { color: #dc2626; background: #fef2f2; }

        /* ── Layout ── */
        .vtf-main { flex: 1; padding-top: 2rem; padding-bottom: 2.5rem; }
        .page-header { margin-bottom: 1.5rem; }
        .page-header h1 { font-size: 1.4rem; font-weight: 700; margin: 0; }
        .page-header p { color: var(--vtf-muted); margin: 0.25rem 0 0; font-size: 0.875rem; }

        /* ── Cards ── */
        .card {
            border: 1px solid var(--vtf-border);
            border-radius: 14px;
            box-shadow: 0 1px 2px rgba(16,24,40,.04);
        }
        .card-header {
            background: var(--vtf-surface);
            border-bottom: 1px solid var(--vtf-border);
            padding: 1rem 1.25rem;
            border-radius: 14px 14px 0 0 !important;
            font-weight: 600;
        }

        /* ── Stat cards ── */
        .stat-card { padding: 1.25rem; display: flex; align-items: center; gap: 1rem; height: 100%; }
        .stat-icon {
            width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-size: 1.35rem;
        }
        .stat-icon.indigo { background: var(--vtf-primary-soft); color: var(--vtf-primary); }
        .stat-icon.green  { background: #e7f7ef; color: #059669; }
        .stat-icon.sky    { background: #e6f4fc; color: #0284c7; }
        .stat-value { font-size: 1.75rem; font-weight: 700; line-height: 1; }
        .stat-label { color: var(--vtf-muted); font-size: 0.8rem; font-weight: 500; margin-top: 0.3rem; }

        /* ── Tables ── */
        .table { margin: 0; color: var(--vtf-text); }
        .table thead th {
            background: #fafbfc; color: var(--vtf-muted);
            font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
            border-bottom: 1px solid var(--vtf-border); padding: 0.7rem 1.25rem;
        }
        .table tbody td { padding: 0.85rem 1.25rem; vertical-align: middle; border-color: #f0f1f4; }
        .table tbody tr:last-child td { border-bottom: 0; }
        .table-hover tbody tr:hover { background: #fafbff; }
        code { background: #f3f4f6; color: var(--vtf-primary-dark); padding: 0.15rem 0.45rem; border-radius: 6px; font-size: 0.82rem; }

        /* ── Badges ── */
        .badge-soft { font-weight: 600; font-size: 0.72rem; padding: 0.35em 0.7em; border-radius: 7px; }
        .badge-soft.ok   { background: #e7f7ef; color: #047857; }
        .badge-soft.off  { background: #f1f3f5; color: #6b7280; }

        /* ── Buttons ── */
        .btn { font-weight: 500; border-radius: 9px; }
        .btn-primary { background: var(--vtf-primary); border-color: var(--vtf-primary); }
        .btn-primary:hover { background: var(--vtf-primary-dark); border-color: var(--vtf-primary-dark); }
        .btn-sm { border-radius: 8px; }

        footer.vtf-footer {
            border-top: 1px solid var(--vtf-border);
            padding: 1rem 0; color: var(--vtf-muted); font-size: 0.8rem; background: var(--vtf-surface);
        }
    </style>
</head>
<body>
    {% set path = request.url.path %}
    <nav class="vtf-navbar">
        <div class="container d-flex align-items-center">
            <a class="vtf-brand me-4" href="/admin/">
                <span class="vtf-brand-mark"><i class="bi bi-soundwave"></i></span>
                <span>Voice-to-Form<small>Console d'administration</small></span>
            </a>
            <div class="d-none d-md-flex gap-1">
                <a class="vtf-nav-link {% if path == '/admin/' %}active{% endif %}" href="/admin/">
                    <i class="bi bi-grid-1x2-fill"></i> Tableau de bord
                </a>
                <a class="vtf-nav-link {% if '/formulaires' in path %}active{% endif %}" href="/admin/formulaires">
                    <i class="bi bi-card-checklist"></i> Formulaires
                </a>
            </div>
            <a class="vtf-nav-link vtf-logout ms-auto" href="/admin/deconnexion">
                <i class="bi bi-box-arrow-right"></i> Déconnexion
            </a>
        </div>
    </nav>

    <main class="vtf-main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="vtf-footer">
        <div class="container d-flex justify-content-between flex-wrap gap-2">
            <span>© Voice-to-Form — Service de dictée médicale</span>
            <span><i class="bi bi-shield-check"></i> Espace sécurisé</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
