<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion · Voice-to-Form Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --vtf-primary: #4f46e5; --vtf-primary-dark: #4338ca; }
        * { font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(1200px 600px at 50% -10%, #e9eafe 0%, #f4f5f8 55%);
            padding: 1rem;
        }
        .login-card {
            width: 100%; max-width: 400px; background: #fff;
            border: 1px solid #e6e8ec; border-radius: 18px;
            box-shadow: 0 12px 40px rgba(16,24,40,.10); padding: 2.25rem;
        }
        .brand-mark {
            width: 52px; height: 52px; border-radius: 14px; margin: 0 auto 1rem;
            background: linear-gradient(135deg, var(--vtf-primary), #7c75f0);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 1.6rem; box-shadow: 0 4px 12px rgba(79,70,229,.4);
        }
        .login-card h1 { font-size: 1.25rem; font-weight: 700; text-align: center; margin-bottom: 0.2rem; }
        .login-card .subtitle { text-align: center; color: #6b7280; font-size: 0.85rem; margin-bottom: 1.75rem; }
        .form-label { font-weight: 500; font-size: 0.85rem; }
        .form-control { border-radius: 10px; padding: 0.6rem 0.85rem; border-color: #e0e2e8; }
        .form-control:focus { border-color: var(--vtf-primary); box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
        .btn-primary {
            background: var(--vtf-primary); border-color: var(--vtf-primary);
            border-radius: 10px; font-weight: 600; padding: 0.6rem;
        }
        .btn-primary:hover { background: var(--vtf-primary-dark); border-color: var(--vtf-primary-dark); }
        .alert { border-radius: 10px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-mark"><i class="bi bi-soundwave"></i></div>
        <h1>Voice-to-Form</h1>
        <p class="subtitle">Console d'administration</p>

        {% if erreur %}
        <div class="alert alert-danger d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-triangle-fill"></i> {{ erreur }}
        </div>
        {% endif %}

        <form method="post" action="/admin/connexion">
            <div class="mb-3">
                <label for="mot_de_passe" class="form-label">Mot de passe</label>
                <div class="input-group">
                    <span class="input-group-text bg-white" style="border-radius:10px 0 0 10px; border-color:#e0e2e8;">
                        <i class="bi bi-lock text-muted"></i>
                    </span>
                    <input type="password" class="form-control" id="mot_de_passe" name="mot_de_passe"
                           style="border-radius:0 10px 10px 0;" autofocus required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right me-1"></i> Se connecter
            </button>
        </form>
    </div>
</body>
</html>
